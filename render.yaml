services:
  - type: web
    name: iching-proxy
    runtime: python
    rootDir: proxy
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --worker-class gthread --threads 4 --timeout 120
    envVars:
      - key: ZHIPU_API_KEY
        sync: false   # 在 Render 控制台手动填写，不提交到仓库
      - key: PORT
        value: 10000  # Render 默认端口
